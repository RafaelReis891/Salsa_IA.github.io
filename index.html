<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Kart Teste</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/@ar-js-org/ar.js@3.4.5/aframe/build/aframe-ar.js"></script>

<style>
body {
    margin:0;
}
.info{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    background:rgba(0,0,0,0.7);
    padding:10px;
    z-index:999;
}
</style>
</head>

<body>

<div class="info">
    Kart Teste v3
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <a-camera gps-new-camera></a-camera>

    <a-sphere
        color="#ff0000"
        radius="5"
        gps-new-entity-place="
            latitude: -22.4420306;
            longitude: -46.9526000;">
    </a-sphere>

</a-scene>

</body>
</html>
