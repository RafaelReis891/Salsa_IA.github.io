<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kart AR Engine PRO</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

/* CAMERA */
#video {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

/* CANVAS 3D */
canvas {
    position:fixed;
    top:0;
    left:0;
    z-index:1;
}

/* HUD */
#hud {
    position:fixed;
    top:10px;
    left:10px;
    z-index:10;
    background:rgba(0,0,0,0.75);
    color:#00ff00;
    padding:12px;
    font-size:13px;
    border-radius:8px;
    max-width:320px;
    line-height:1.4;
}

/* BOTÃO */
button {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    padding:14px 20px;
    font-size:16px;
    border-radius:30px;
    border:none;
    background:#ff3b3b;
    color:white;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<video id="video" autoplay playsinline muted></video>
<div id="hud">Inicializando...</div>

<button onclick="resetOrigin()">📍 Recalibrar origem</button>

<script>

// ==========================
// TARGET (KART)
// ==========================
const targetLat = -22.4420306;
const targetLon = -46.9526000;

// ==========================
// ORIGEM (usuário)
// ==========================
let originLat = null;
let originLon = null;

// suavização GPS
let smoothLat = null;
let smoothLon = null;

// heading
let heading = 0;

// ==========================
// THREE SETUP
// ==========================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.1,
    10000
);

const renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ==========================
// OBJETO KART
// ==========================
const kart = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 24, 24),
    new THREE.MeshBasicMaterial({ color:0xff0000 })
);

scene.add(kart);

// ==========================
// CAMERA REAL
// ==========================
navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
}).then(stream => {
    document.getElementById("video").srcObject = stream;
});

// ==========================
// UTIL: GPS → METROS
// ==========================
function latLonToMeters(lat, lon)
{
    const R = 6378137;

    const dLat = (lat - originLat) * Math.PI/180;
    const dLon = (lon - originLon) * Math.PI/180;

    const x = dLon * R * Math.cos(originLat * Math.PI/180);
    const z = dLat * R;

    return { x, z };
}

// distância
function distance(aLat,aLon,bLat,bLon)
{
    const R = 6371000;
    const dLat = (bLat-aLat)*Math.PI/180;
    const dLon = (bLon-aLon)*Math.PI/180;

    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(aLat*Math.PI/180) *
        Math.cos(bLat*Math.PI/180) *
        Math.sin(dLon/2)**2;

    return R * 2 * Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ==========================
// GPS
// ==========================
navigator.geolocation.watchPosition(pos => {

    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    // suavização simples (anti jitter)
    if(smoothLat === null) {
        smoothLat = lat;
        smoothLon = lon;
    }

    smoothLat = smoothLat * 0.85 + lat * 0.15;
    smoothLon = smoothLon * 0.85 + lon * 0.15;

    if(originLat === null)
    {
        originLat = smoothLat;
        originLon = smoothLon;
    }

    // posição do usuário no mundo local
    const user = latLonToMeters(smoothLat, smoothLon);

    camera.position.x = user.x;
    camera.position.z = user.z;

    // alvo
    const tgt = latLonToMeters(targetLat, targetLon);

    kart.position.x = tgt.x;
    kart.position.z = tgt.z;
    kart.position.y = 1.5;

    const dist = distance(smoothLat,smoothLon,targetLat,targetLon);

    document.getElementById("hud").innerHTML =
        "📍 USER<br>" +
        smoothLat.toFixed(6) + " / " + smoothLon.toFixed(6) + "<br><br>" +

        "🎯 KART<br>" +
        targetLat + " / " + targetLon + "<br><br>" +

        "📏 DISTÂNCIA<br>" +
        dist.toFixed(1) + " m";

});

// ==========================
// BÚSSOLA (somente Y)
// ==========================
window.addEventListener("deviceorientation", e => {

    if(e.alpha !== null)
    {
        heading = (360 - e.alpha) * Math.PI/180;

        // só rotação horizontal (IMPORTANTE)
        camera.rotation.y = heading;
    }
});

// ==========================
// RESET
// ==========================
function resetOrigin()
{
    originLat = null;
    originLon = null;
}

// ==========================
// LOOP
// ==========================
function animate()
{
    requestAnimationFrame(animate);
    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
