<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Kart AR Debug</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<style>
html,body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}

#hud{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    z-index:9999;
    color:white;
    background:rgba(0,0,0,0.75);
    padding:10px;
    box-sizing:border-box;
    font-size:14px;
}

button{
    margin:3px;
    padding:10px;
    font-size:16px;
}
</style>
</head>
<body>

<div id="hud">

<div id="info">
Aguardando GPS...
</div>

<br>

<button onclick="toggleSphere()">Mostrar/Ocultar</button>
<button onclick="increaseScale()">+</button>
<button onclick="decreaseScale()">-</button>

</div>

<a-scene>

    <a-camera id="cam" position="0 1.6 0"></a-camera>

    <a-sphere
        id="kartSphere"
        position="0 1.5 -5"
        radius="0.5"
        color="red">
    </a-sphere>

</a-scene>

<script>

// Coordenada fornecida por você
const targetLat = -22.4420306;
const targetLon = -46.9526000;

let sphere =
document.getElementById("kartSphere");

let sphereScale = 1;

function toRad(v){
    return v * Math.PI / 180;
}

function distanceMeters(lat1, lon1, lat2, lon2)
{
    const R = 6371000;

    const dLat = toRad(lat2-lat1);
    const dLon = toRad(lon2-lon1);

    const a =
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(toRad(lat1)) *
        Math.cos(toRad(lat2)) *
        Math.sin(dLon/2) *
        Math.sin(dLon/2);

    const c = 2 * Math.atan2(
        Math.sqrt(a),
        Math.sqrt(1-a)
    );

    return R * c;
}

function toggleSphere()
{
    let vis =
        sphere.getAttribute("visible");

    sphere.setAttribute(
        "visible",
        !vis
    );
}

function increaseScale()
{
    sphereScale += 0.2;

    sphere.setAttribute(
        "scale",
        `${sphereScale} ${sphereScale} ${sphereScale}`
    );
}

function decreaseScale()
{
    sphereScale -= 0.2;

    if(sphereScale < 0.2)
        sphereScale = 0.2;

    sphere.setAttribute(
        "scale",
        `${sphereScale} ${sphereScale} ${sphereScale}`
    );
}

navigator.geolocation.watchPosition(
    pos =>
    {
        const lat =
            pos.coords.latitude;

        const lon =
            pos.coords.longitude;

        const accuracy =
            pos.coords.accuracy;

        const dist =
            distanceMeters(
                lat,
                lon,
                targetLat,
                targetLon
            );

        document.getElementById("info")
        .innerHTML =

        "<b>SUA POSIÇÃO</b><br>" +
        "Lat: " + lat.toFixed(6) + "<br>" +
        "Lon: " + lon.toFixed(6) + "<br>" +
        "Precisão: " + accuracy.toFixed(1) + "m<br><br>" +

        "<b>ESFERA</b><br>" +
        "Lat: " + targetLat + "<br>" +
        "Lon: " + targetLon + "<br><br>" +

        "<b>DISTÂNCIA</b><br>" +
        dist.toFixed(1) + " metros";
    },
    err =>
    {
        document.getElementById("info")
        .innerHTML =
        "Erro GPS: " + err.message;
    },
    {
        enableHighAccuracy:true,
        maximumAge:0
    }
);

</script>

</body>
</html>
