<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AR KART CORE - Estabilizado</title>

<style>
body { margin: 0; overflow: hidden; background: black; font-family: Arial, sans-serif; }
#video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
#canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

#ui {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background: rgba(0, 0, 0, 0.85); color: #00ff00;
    padding: 12px; font-size: 13px; border-radius: 8px;
    max-width: 300px; line-height: 1.5; border: 1px solid #00ff00;
}

.controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 300px;
}

.btn {
    padding: 15px; font-size: 16px; font-weight: bold; border: none;
    border-radius: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center;
}
#permission-btn { background: #007bff; color: white; }
#reset-btn { background: #ff9800; color: white; display: none; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="ui">Inicializando sensores...</div>

<div class="controls">
    <button id="permission-btn" class="btn">📱 Ativar Sensores</button>
    <button id="reset-btn" class="btn">🔄 Recalibrar Posição</button>
</div>

<video id="video" autoplay playsinline muted></video>
<div id="canvas-container"></div>

<script>

// ======================
// 1. CONFIGURAÇÕES
// ======================
const targetLat = -22.4420306;
const targetLon = -46.9526000;
const VISUAL_DISTANCE = 40; // Distância fixa para visualização

// Variáveis de Estado
let originLat = null;
let originLon = null;
let currentDistance = 0;
let targetBearing = 0;

// Variáveis para SUAVIZAÇÃO (O segredo da estabilidade)
let rawHeading = 0;
let smoothedHeading = 0;
let isHeadingValid = false;
let lastUpdateLat = null;
let lastUpdateLon = null;

// ======================
// 2. THREE.JS SETUP
// ======================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 20000);
camera.position.set(0, 1.6, 0);
camera.lookAt(0, 1.6, -1);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
document.getElementById('canvas-container').appendChild(renderer.domElement);

// --- OBJETO ALVO ---
const targetGroup = new THREE.Group();
scene.add(targetGroup);

const sphereGeo = new THREE.SphereGeometry(1.5, 32, 32);
const sphereMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.9 });
const sphere = new THREE.Mesh(sphereGeo, sphereMat);
sphere.position.y = 2;
targetGroup.add(sphere);

const ringGeo = new THREE.RingGeometry(2, 2.3, 32);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2;
ring.position.y = 2;
targetGroup.add(ring);

// Base no chão para referência
const baseGeo = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
const baseMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.4 });
const base = new THREE.Mesh(baseGeo, baseMat);
base.position.y = 1;
targetGroup.add(base);

sphere.frustumCulled = false;
ring.frustumCulled = false;
base.frustumCulled = false;

// ======================
// 3. CÂMERA
// ======================
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
    document.getElementById("video").srcObject = stream;
})
.catch(err => {
    document.getElementById("ui").innerHTML = "ERRO CÂMERA: " + err.message;
});

// ======================
// 4. GPS COM TRAVA DE MOVIMENTO
// ======================
function processGPS(lat, lon, accuracy) {
    if (originLat === null) {
        originLat = lat;
        originLon = lon;
        lastUpdateLat = lat;
        lastUpdateLon = lon;
        document.getElementById("reset-btn").style.display = "block";
    }

    currentDistance = getDistance(lat, lon, targetLat, targetLon);
    
    // TRAVA DE MOVIMENTO: Só recalcula a direção se o usuário andar mais de 5 metros
    // Isso ignora o "drift" do GPS quando você está parado
    const distMoved = getDistance(lat, lon, lastUpdateLat, lastUpdateLon);
    
    if (distMoved > 5.0 || targetBearing === 0) {
        targetBearing = getBearing(lat, lon, targetLat, targetLon);
        lastUpdateLat = lat;
        lastUpdateLon = lon;
    }

    updateUI(accuracy);
}

navigator.geolocation.watchPosition(pos => {
    processGPS(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
}, err => {
    document.getElementById("ui").innerHTML = "ERRO GPS: " + err.message;
}, { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 });

document.getElementById("reset-btn").addEventListener("click", () => {
    originLat = null;
    lastUpdateLat = null;
    targetBearing = 0;
    document.getElementById("ui").innerHTML = "🔄 Recalibrando... Fique parado.";
});

function updateUI(accuracy) {
    const status = originLat === null ? "⏳ Aguardando GPS..." : "✅ GPS Estabilizado";
    const headingStatus = isHeadingValid ? `${smoothedHeading.toFixed(0)}°` : "Calibrando...";
    
    document.getElementById("ui").innerHTML = 
        `${status}<br>` +
        `🎯 Distância REAL: <b>${currentDistance.toFixed(1)} m</b><br>` +
        `🧭 Alvo está a: <b>${targetBearing.toFixed(0)}°</b><br>` +
        `📱 Celular aponta: <b>${headingStatus}</b><br>` +
        `📏 Precisão: ${accuracy.toFixed(1)}m<br>` +
        `<small style="color:#00ffff">💡 A esfera está travada no mundo. Se derivar, clique em Recalibrar.</small>`;
}

// ======================
// 5. BÚSSOLA COM SUAVIZAÇÃO (LOW-PASS FILTER)
// ======================
function handleOrientation(event) {
    isHeadingValid = true;
    if (event.webkitCompassHeading !== undefined) {
        rawHeading = event.webkitCompassHeading;
    } else if (event.alpha !== null) {
        rawHeading = (360 - event.alpha) % 360;
    }

    // SUAVIZAÇÃO INTELIGENTE (Lida com a transição de 359° para 0°)
    let diff = rawHeading - smoothedHeading;
    // Encontra o caminho mais curto para girar
    while (diff > 180) diff -= 360;
    while (diff < -180) diff += 360;
    
    // Aplica o filtro (0.15 = suave e estável, 1.0 = instantâneo e tremido)
    smoothedHeading += diff * 0.15;
    
    // Mantém o valor entre 0 e 360
    if (smoothedHeading < 0) smoothedHeading += 360;
    if (smoothedHeading >= 360) smoothedHeading -= 360;
}

function requestPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(state => {
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                    document.getElementById('permission-btn').style.display = 'none';
                }
            })
            .catch(console.error);
    } else {
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
        window.addEventListener('deviceorientation', handleOrientation, true);
        document.getElementById('permission-btn').style.display = 'none';
    }
}

if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById("permission-btn").style.display = "block";
    document.getElementById("permission-btn").addEventListener("click", requestPermission);
} else {
    requestPermission();
}

// ======================
// 6. MATEMÁTICA
// ======================
function getBearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const lat1Rad = lat1 * Math.PI / 180;
    const lat2Rad = lat2 * Math.PI / 180;
    const y = Math.sin(dLon) * Math.cos(lat2Rad);
    const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) - Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
    let brng = Math.atan2(y, x) * 180 / Math.PI;
    return (brng + 360) % 360;
}

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// ======================
// 7. LOOP DE ANIMAÇÃO ESTABILIZADO
// ======================
function animate() {
    requestAnimationFrame(animate);

    if (originLat !== null && isHeadingValid && targetBearing !== 0) {
        // Calcula o ângulo relativo entre o alvo e a direção suavizada do celular
        let relativeAngle = targetBearing - smoothedHeading;
        
        while (relativeAngle > 180) relativeAngle -= 360;
        while (relativeAngle < -180) relativeAngle += 360;

        const rad = relativeAngle * (Math.PI / 180);

        // Posiciona o objeto
        targetGroup.position.x = VISUAL_DISTANCE * Math.sin(rad);
        targetGroup.position.z = -VISUAL_DISTANCE * Math.cos(rad);
        targetGroup.position.y = 0;
    }

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
