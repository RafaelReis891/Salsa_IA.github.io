<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR KART CORE</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background: black;
}

#video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

#ui {
    position:absolute;
    top:0;
    left:0;
    z-index:10;
    background:rgba(0,0,0,0.7);
    color:white;
    padding:10px;
    font-family:Arial;
    font-size:12px;
    max-width: 300px;
}

#permission-btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    padding: 20px 40px;
    font-size: 18px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
    display: none;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

<div id="ui">
GPS: carregando...<br>
Distância: --
</div>

<button id="permission-btn">Ativar Sensores</button>

<video id="video" autoplay playsinline muted></video>

<script>

// ======================
// CONFIG KART
// ======================
const targetLat = -22.4420306;
const targetLon = -46.9526000;

// ======================
// THREE SETUP
// ======================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    10000
);

// Garantir que a câmera está olhando para -Z
camera.position.set(0, 0, 0);
camera.lookAt(0, 0, -1);

const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
document.body.appendChild(renderer.domElement);

// Posicionar canvas sobre o vídeo
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '1';

// ======================
// ESFERA PRINCIPAL (KART)
// ======================
const geometry = new THREE.SphereGeometry(5, 32, 32);
const material = new THREE.MeshBasicMaterial({
    color:0xff0000,
    transparent: true,
    opacity: 0.9
});
const sphere = new THREE.Mesh(geometry, material);
scene.add(sphere);

// ======================
// OBJETO DE TESTE - SEMPRE VISÍVEL
// ======================
// Esfera azul fixa na frente da câmera para teste
const testGeometry = new THREE.SphereGeometry(3, 32, 32);
const testMaterial = new THREE.MeshBasicMaterial({
    color: 0x0000ff,
    transparent: true,
    opacity: 0.7
});
const testSphere = new THREE.Mesh(testGeometry, testMaterial);
testSphere.position.set(0, 0, -20); // 20 unidades na frente
scene.add(testSphere);

// Adicionar eixo para visualização
const axesHelper = new THREE.AxesHelper(10);
scene.add(axesHelper);

// ======================
// CAMERA REAL - VÍDEO COMO FUNDO
// ======================
navigator.mediaDevices.getUserMedia({ video: { facingMode:"environment" } })
.then(stream => {
    const video = document.getElementById("video");
    video.srcObject = stream;
    video.play();
})
.catch(err => {
    console.error("Erro ao acessar câmera:", err);
    document.getElementById("ui").innerHTML += "<br>ERRO CÂMERA: " + err.message;
});

// ======================
// GPS E VARIÁVEIS GLOBAIS
// ======================
let userLat = 0;
let userLon = 0;
let distance = 0;
let bearing = 0;
let deviceHeading = 0;

// ======================
// SOLICITAR PERMISSÃO DE ORIENTAÇÃO (iOS 13+)
// ======================
function requestOrientationPermission() {
    if (typeof DeviceOrientationEvent !== 'undefined' && 
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(permissionState => {
                if (permissionState === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                    document.getElementById('permission-btn').style.display = 'none';
                }
            })
            .catch(console.error);
    } else {
        window.addEventListener('deviceorientationabsolute', handleOrientation, true);
        window.addEventListener('deviceorientation', handleOrientation, true);
    }
}

if (typeof DeviceOrientationEvent !== 'undefined' && 
    typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('permission-btn').style.display = 'block';
    document.getElementById('permission-btn').addEventListener('click', requestOrientationPermission);
} else {
    requestOrientationPermission();
}

// ======================
// GPS
// ======================
navigator.geolocation.watchPosition(pos => {

    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    distance = getDistance(userLat, userLon, targetLat, targetLon);
    bearing = getBearing(userLat, userLon, targetLat, targetLon);

    updateSpherePosition();

    document.getElementById("ui").innerHTML =
        "GPS OK V5<br>" +
        "Lat: " + userLat.toFixed(6) + "<br>" +
        "Lon: " + userLon.toFixed(6) + "<br>" +
        "Distância: " + distance.toFixed(1) + " m<br>" +
        "Bearing: " + bearing.toFixed(1) + "°<br>" +
        "Heading: " + deviceHeading.toFixed(1) + "°<br>" +
        "Esfera X: " + sphere.position.x.toFixed(2) + "<br>" +
        "Esfera Y: " + sphere.position.y.toFixed(2) + "<br>" +
        "Esfera Z: " + sphere.position.z.toFixed(2);

}, err => {
    document.getElementById("ui").innerHTML = "ERRO GPS: " + err.message;
}, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 5000
});

// ======================
// DEVICE ORIENTATION (BÚSSOLA)
// ======================
function handleOrientation(event) {
    if (event.webkitCompassHeading) {
        deviceHeading = event.webkitCompassHeading;
    } else if (event.alpha) {
        deviceHeading = 360 - event.alpha;
    }
    
    updateSpherePosition();
}

// ======================
// CALCULAR BEARING (AZIMUTE)
// ======================
function getBearing(lat1, lon1, lat2, lon2) {
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const lat1Rad = lat1 * Math.PI / 180;
    const lat2Rad = lat2 * Math.PI / 180;
    
    const y = Math.sin(dLon) * Math.cos(lat2Rad);
    const x = Math.cos(lat1Rad) * Math.sin(lat2Rad) -
              Math.sin(lat1Rad) * Math.cos(lat2Rad) * Math.cos(dLon);
    
    let bearing = Math.atan2(y, x) * 180 / Math.PI;
    bearing = (bearing + 360) % 360;
    
    return bearing;
}

// ======================
// DISTÂNCIA REAL
// ======================
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    
    const a =
        Math.sin(dLat/2)**2 +
        Math.cos(lat1*Math.PI/180) *
        Math.cos(lat2*Math.PI/180) *
        Math.sin(dLon/2)**2;
    
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ======================
// ATUALIZAR POSIÇÃO DA ESFERA
// ======================
function updateSpherePosition() {
    if (distance === 0) return;
    
    // Calcular diferença entre bearing do alvo e heading do dispositivo
    let angleDiff = bearing - deviceHeading;
    
    // Normalizar para -180 a 180
    while (angleDiff > 180) angleDiff -= 360;
    while (angleDiff < -180) angleDiff += 360;
    
    // Converter para radianos
    const angleRad = angleDiff * Math.PI / 180;
    
    // Distância no mundo 3D - usar distância real em metros
    // Ajuste o divisor para controlar a escala
    const zDistance = -Math.min(distance / 10, 100);
    
    // Posicionar esfera baseado no ângulo relativo
    sphere.position.x = Math.sin(angleRad) * Math.abs(zDistance);
    sphere.position.y = 0;
    sphere.position.z = zDistance;
    
    console.log("Esfera posicionada em:", sphere.position);
}

// ======================
// LOOP
// ======================
function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

animate();

// ======================
// RESIZE
// ======================
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
